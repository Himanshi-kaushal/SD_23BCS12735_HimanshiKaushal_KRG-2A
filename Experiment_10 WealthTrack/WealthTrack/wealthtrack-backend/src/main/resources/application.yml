server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: wealthtrack-backend
  
  # CORS Configuration
  web:
    cors:
      allowed-origins: 
        - "http://localhost:3000"
        - "http://localhost:5173"
      allowed-methods: 
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers: "*"
      allow-credentials: true

# Firebase Configuration
firebase:
  service-account-key: classpath:firebase-service-account.json
  database-url: "https://gen-lang-client-0956929992-default-rtdb.firebaseio.com"

# Logging
logging:
  level:
    com.wealthtrack: DEBUG
    org.springframework.security: DEBUG